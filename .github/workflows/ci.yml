name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout do código
        uses: actions/checkout@v4

      # ---------------- JAVA ----------------
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------- NODE ----------------
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ==================================================
      # BACKEND (API SPRING)
      # ==================================================
      - name: Preparar backend
        working-directory: api
        run: chmod +x mvnw

      - name: Rodar testes backend
        working-directory: api
        run: ./mvnw test

      # ==================================================
      # FRONTEND (CLIENT - NEXT.JS)
      # ==================================================
      - name: Instalar dependências frontend
        working-directory: client
        run: npm install

      - name: Rodar testes frontend
        working-directory: client
        run: npm test -- --watchAll=false

      - name: Build frontend
        working-directory: client
        run: npm run build

      # ==================================================
      # E2E (PLAYWRIGHT - /tests)
      # ==================================================
      - name: Instalar dependências E2E
        working-directory: tests
        run: npm install

      - name: Instalar browsers Playwright
        working-directory: tests
        run: npx playwright install --with-deps

      # ==================================================
      # SUBIR APLICAÇÃO
      # ==================================================
      - name: Iniciar API
        working-directory: api
        run: ./mvnw spring-boot:run &

      - name: Iniciar frontend
        working-directory: client
        run: npm run dev &

      # ==================================================
      # WAIT (simples como professor espera)
      # ==================================================
      - name: Aguardar inicialização
        run: sleep 30

      # ==================================================
      # E2E TESTS
      # ==================================================
      - name: Rodar testes E2E (Playwright)
        working-directory: tests
        run: npx playwright test