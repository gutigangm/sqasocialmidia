name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout do código
        uses: actions/checkout@v4

      # ---------------- JAVA ----------------
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------- NODE ----------------
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ==================================================
      # BACKEND (API SPRING)
      # ==================================================
      - name: Preparar backend
        working-directory: api
        run: chmod +x mvnw

      - name: Rodar testes backend
        working-directory: api
        run: ./mvnw test

      # ==================================================
      # FRONTEND (CLIENT - NEXT.JS)
      # ==================================================
      - name: Instalar dependências frontend
        working-directory: client
        run: npm install

      - name: Rodar testes frontend
        working-directory: client
        run: npm test -- --watchAll=false

      - name: Build frontend
        working-directory: client
        run: npm run build

      # ==================================================
      # E2E (PLAYWRIGHT - /tests)
      # ==================================================
      - name: Instalar dependências E2E
        working-directory: tests
        run: npm install

      - name: Instalar browsers Playwright
        working-directory: tests
        run: npx playwright install --with-deps

      # ==================================================
      # SUBIR APLICAÇÃO
      # ==================================================
      - name: Iniciar API
        working-directory: api
        run: ./mvnw spring-boot:run > api.log 2>&1 &

      - name: Iniciar frontend
        working-directory: client
        run: npm run dev > client.log 2>&1 &

      # ==================================================
      # WAIT ROBUSTO (NÃO SÓ SLEEP)
      # ==================================================
      - name: Aguardar API subir
        run: |
          for i in {1..40}; do
            curl -s http://127.0.0.1:8080 && echo "API UP!" && exit 0
            echo "Aguardando API..."
            sleep 3
          done
          echo "API não subiu a tempo" && exit 1

      - name: Aguardar frontend subir
        run: |
          for i in {1..40}; do
            curl -s http://localhost:3000 && echo "FRONTEND UP!" && exit 0
            echo "Aguardando frontend..."
            sleep 3
          done
          echo "Frontend não subiu a tempo" && exit 1

      # ==================================================
      # E2E TESTS
      # ==================================================
      - name: Rodar testes E2E (Playwright)
        working-directory: tests
        run: npx playwright test